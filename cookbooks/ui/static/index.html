<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gemini Live Cookbooks</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; }
        h1 { color: #333; }
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; cursor: pointer; transition: box-shadow 0.2s; }
        .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .card h3 { margin: 0 0 0.5rem; }
        .card p { color: #666; margin: 0 0 0.5rem; font-size: 0.9rem; }
        .badge { display: inline-block; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin-right: 4px; }
        .category { color: #999; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin: 1.5rem 0 0.5rem; }
    </style>
</head>
<body>
    <h1>Gemini Live Cookbooks</h1>
    <p>Interactive demos showcasing Gemini Live API patterns.</p>
    <div id="apps" class="apps">Loading...</div>
    <script>
        fetch('/api/apps').then(r => r.json()).then(apps => {
            const container = document.getElementById('apps');
            if (apps.length === 0) {
                container.innerHTML = '<p>No apps registered yet. Check back after implementing CUI-4.</p>';
                return;
            }
            const groups = {};
            apps.forEach(app => {
                if (!groups[app.category]) groups[app.category] = [];
                groups[app.category].push(app);
            });
            let html = '';
            for (const [category, catApps] of Object.entries(groups)) {
                html += `<div class="category">${category}</div>`;
                catApps.forEach(app => {
                    const badges = app.features.map(f => `<span class="badge">${f}</span>`).join('');
                    html += `<div class="card" onclick="location.href='/app/${app.name}'">
                        <h3>${app.name}</h3>
                        <p>${app.description}</p>
                        <div>${badges}</div>
                    </div>`;
                });
            }
            container.innerHTML = html;
        });
    </script>
</body>
</html>
