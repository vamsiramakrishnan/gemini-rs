<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live RS - Tester UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Configuration</h2>
            <div class="form-group">
                <label for="model-select">Model</label>
                <select id="model-select">
                    <option value="gemini-live-2.5-flash-native-audio" selected>Gemini Live 2.5 Flash (Native Audio)</option>
                    <option value="gemini-2.0-flash-live-001">Gemini 2.0 Flash Live</option>
                </select>
            </div>
            <div class="form-group">
                <label for="voice-select">Voice</label>
                <select id="voice-select">
                    <option value="Aoede">Aoede</option>
                    <option value="Puck">Puck</option>
                    <option value="Charon">Charon</option>
                    <option value="Kore">Kore</option>
                    <option value="Fenrir">Fenrir</option>
                </select>
            </div>
            <div class="form-group">
                <label for="system-instruction">System Instruction</label>
                <textarea id="system-instruction" rows="4">You are a helpful voice assistant. Keep responses concise.</textarea>
            </div>
            <button id="connect-btn" class="primary-btn">Connect</button>
            <button id="disconnect-btn" class="danger-btn" disabled>Disconnect</button>
            
            <div class="status-box">
                Status: <span id="status-text" class="status-disconnected">Disconnected</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2>Conversation</h2>
            </header>
            
            <div class="messages" id="messages">
                <!-- Messages will be injected here -->
            </div>

            <div id="speaking-indicator" class="speaking-indicator">Listening...</div>

            <div class="input-area">
                <button id="mic-btn" class="mic-btn" disabled>🎤</button>
                <input type="text" id="text-input" placeholder="Type a message..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
