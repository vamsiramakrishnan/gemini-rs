name: Documentation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-docs:
    name: Check documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2
      - name: Check rustdoc builds with no warnings
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Check mdBook builds
        run: mdbook build docs

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Build mdBook user guide
        run: mdbook build docs
      - name: Build rustdoc API reference
        run: cargo doc --no-deps --workspace
      - name: Merge rustdoc into mdBook output
        run: |
          cp -r target/doc target/book/api
          echo '<meta http-equiv="refresh" content="0; url=api/rs_genai/index.html">' > target/book/api/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book
      - id: deployment
        uses: actions/deploy-pages@v4
