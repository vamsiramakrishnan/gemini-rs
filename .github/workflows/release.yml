name: Release

# Triggered by pushing a vX.Y.Z tag (created by `just release`).
# Flow: validate → publish (L0→L1→L2→server→cli) → GitHub Release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-releases: v0.6.0-rc.1

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write   # needed to create GitHub Release

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Validate: tests + clippy (same gating as CI, on the tagged commit)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Pre-publish verification — only verify L0 (independent crate).
      # Dependent crates (L1+) can't dry-run until L0 is on crates.io,
      # so we verify them with --no-verify during actual publish (Job 2).
      - name: Verify L0 crate manifest
        run: cargo publish -p gemini-genai-rs --dry-run

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Publish: crates.io in strict dependency order
#
# Publish order (must match dependency graph):
#   L0  gemini-genai-rs
#   L1  gemini-adk-rs          (depends on gemini-genai-rs)
#   L2  gemini-adk-fluent-rs   (depends on gemini-genai-rs, gemini-adk-rs)
#   app gemini-adk-server-rs   (depends on gemini-adk-rs)
#   bin gemini-adk-cli-rs      (depends on all above)
#
# Each step:
#   1. Reads version from Cargo metadata (single source of truth)
#   2. Checks crates.io — skips if that exact version already exists
#   3. Polls until crate appears in sparse index (max ~3 min) before next crate
# ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2

      # ── Helper: publish one crate, then poll until it appears in the index ──
      - name: Define publish helper
        run: |
          cat > /tmp/publish.sh << 'HELPER'
          #!/usr/bin/env bash
          set -euo pipefail
          CRATE=$1
          VERSION=$(cargo metadata --format-version=1 --no-deps | \
            jq -r --arg c "$CRATE" '.packages[] | select(.name == $c) | .version')

          echo "::group::$CRATE @ $VERSION"

          # Check if already published
          HTTP=$(curl -sI -o /dev/null -w "%{http_code}" \
            "https://static.crates.io/crates/$CRATE/$CRATE-${VERSION}.crate" 2>/dev/null || echo 000)
          if [ "$HTTP" = "200" ]; then
            echo "✓ $CRATE@$VERSION already on crates.io — skipping"
            echo "::endgroup::"
            exit 0
          fi

          echo "Publishing $CRATE@$VERSION ..."
          cargo publish -p "$CRATE" --no-verify

          # Poll until the crate appears on static.crates.io (max 240s with backoff)
          echo "Waiting for $CRATE@$VERSION to appear on crates.io..."
          DELAY=5
          TOTAL=0
          MAX_WAIT=240
          while [ "$TOTAL" -lt "$MAX_WAIT" ]; do
            sleep "$DELAY"
            TOTAL=$((TOTAL + DELAY))
            HTTP=$(curl -sI -o /dev/null -w "%{http_code}" \
              "https://static.crates.io/crates/$CRATE/$CRATE-${VERSION}.crate" 2>/dev/null || echo 000)
            if [ "$HTTP" = "200" ]; then
              echo "✓ $CRATE@$VERSION confirmed available (${TOTAL}s)"
              echo "::endgroup::"
              exit 0
            fi
            echo "  …still waiting (${TOTAL}s elapsed)"
            # Backoff: 5, 5, 10, 10, 15, 15...
            [ "$TOTAL" -ge 30 ] && DELAY=10
            [ "$TOTAL" -ge 60 ] && DELAY=15
          done
          echo "::warning::Timed out waiting for $CRATE@$VERSION after ${MAX_WAIT}s — proceeding anyway"
          echo "::endgroup::"
          HELPER
          chmod +x /tmp/publish.sh

      - name: Publish gemini-genai-rs (L0)
        run: /tmp/publish.sh gemini-genai-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-rs (L1)
        run: /tmp/publish.sh gemini-adk-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-fluent-rs (L2)
        run: /tmp/publish.sh gemini-adk-fluent-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-server-rs
        run: /tmp/publish.sh gemini-adk-server-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-cli-rs
        run: /tmp/publish.sh gemini-adk-cli-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — GitHub Release: auto-generated from tag annotation + git log
# ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"

          # Use annotated tag message as release body (set by release.sh)
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)

          if [ -n "$TAG_MSG" ] && [ "$(echo "$TAG_MSG" | wc -l)" -gt 2 ]; then
            echo "Using annotated tag message for release body"
            {
              echo "body<<RELEASE_EOF"
              echo "$TAG_MSG"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # Fallback: generate from git log
            echo "Generating release body from git log"
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${TAG}"
            else
              RANGE="${TAG}"
            fi
            {
              echo "body<<RELEASE_EOF"
              echo "## What's Changed"
              echo ""
              git log --oneline --no-decorate "$RANGE" | while read -r line; do
                echo "- $line"
              done
              echo ""
              echo "### Crates"
              echo ""
              echo "| Crate | Version | Install |"
              echo "|-------|---------|---------|"
              echo "| \`gemini-genai-rs\` | $VERSION | \`cargo add gemini-genai-rs@${VERSION}\` |"
              echo "| \`gemini-adk-rs\` | $VERSION | \`cargo add gemini-adk-rs@${VERSION}\` |"
              echo "| \`gemini-adk-fluent-rs\` | $VERSION | \`cargo add gemini-adk-fluent-rs@${VERSION}\` |"
              echo "| \`gemini-adk-server-rs\` | $VERSION | \`cargo add gemini-adk-server-rs@${VERSION}\` |"
              echo "| \`gemini-adk-cli-rs\` | $VERSION | \`cargo install gemini-adk-cli-rs@${VERSION}\` |"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.version }}"
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          make_latest: ${{ !contains(steps.ver.outputs.version, '-') }}
