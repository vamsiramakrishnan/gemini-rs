name: Release

# Triggered by pushing a vX.Y.Z tag (created by scripts/release.sh).
# Flow: validate → publish (L0→L1→L2→server→cli) → GitHub Release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-releases: v0.6.0-rc.1

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write   # needed to create GitHub Release

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Validate: tests + clippy (same gating as CI, but on the tagged commit)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Publish: crates.io in strict dependency order
#
# Publish order (must match dependency graph):
#   L0  gemini-live
#   L1  gemini-adk          (depends on gemini-live)
#   L2  gemini-adk-fluent   (depends on gemini-live, gemini-adk)
#   app gemini-adk-server (depends on gemini-adk)
#   bin gemini-adk-cli         (depends on gemini-live, gemini-adk, gemini-adk-fluent, gemini-adk-server)
#
# gemini-adk-web and gemini-adk-api are publish = false (deployment apps, not library crates).
#
# Each step:
#   1. Reads version from Cargo metadata (single source of truth: workspace version)
#   2. Checks crates.io API — skips if that exact version already exists
#   3. Polls until the crate appears in the sparse index (max ~3 min) before
#      proceeding to the next crate, so downstream crates can resolve the dep
# ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2

      # ── Helper: publish one crate, then poll until it appears in the index ──
      # Usage:  publish_and_wait <crate-name>
      - name: Define publish helper
        run: |
          cat > /tmp/publish.sh << 'HELPER'
          #!/usr/bin/env bash
          set -euo pipefail
          CRATE=$1
          VERSION=$(cargo metadata --format-version=1 --no-deps | \
            jq -r --arg c "$CRATE" '.packages[] | select(.name == $c) | .version')

          echo "::group::$CRATE @ $VERSION"

          # Check if already published
          HTTP=$(curl -sI -o /dev/null -w "%{http_code}" \
            "https://static.crates.io/crates/$CRATE/$CRATE-${VERSION}.crate" 2>/dev/null || echo 000)
          if [ "$HTTP" = "200" ]; then
            echo "✓ $CRATE@$VERSION already on crates.io — skipping"
            echo "::endgroup::"
            exit 0
          fi

          echo "Publishing $CRATE@$VERSION ..."
          cargo publish -p "$CRATE" --no-verify

          # Poll until the crate appears on static.crates.io (max 180 s)
          echo "Waiting for $CRATE@$VERSION to appear on crates.io..."
          for i in $(seq 1 36); do
            sleep 5
            HTTP=$(curl -sI -o /dev/null -w "%{http_code}" \
              "https://static.crates.io/crates/$CRATE/$CRATE-${VERSION}.crate" 2>/dev/null || echo 000)
            if [ "$HTTP" = "200" ]; then
              echo "✓ $CRATE@$VERSION confirmed available (${i}×5 s)"
              echo "::endgroup::"
              exit 0
            fi
            echo "  …still waiting ($((i * 5)) s elapsed)"
          done
          echo "::warning::Timed out waiting for $CRATE@$VERSION after 180 s"
          echo "::endgroup::"
          HELPER
          chmod +x /tmp/publish.sh

      - name: Publish gemini-live (L0)
        run: /tmp/publish.sh gemini-live
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk (L1)
        run: /tmp/publish.sh gemini-adk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-fluent (L2)
        run: /tmp/publish.sh gemini-adk-fluent
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-server
        run: /tmp/publish.sh gemini-adk-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-adk-cli
        run: /tmp/publish.sh gemini-adk-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — GitHub Release: uses the pre-written GITHUB_RELEASE_vX.Y.Z.md file
#          if it exists; falls back to auto-generated changelog
# ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          NOTES_FILE="GITHUB_RELEASE_v${VERSION}.md"

          if [ -f "$NOTES_FILE" ]; then
            echo "Using pre-written release notes: $NOTES_FILE"
            {
              echo "body<<RELEASE_EOF"
              cat "$NOTES_FILE"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No $NOTES_FILE found — generating from git log"
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            else
              RANGE="${GITHUB_REF_NAME}"
            fi
            {
              echo "body<<RELEASE_EOF"
              echo "## What's Changed"
              echo ""
              git log --oneline --no-decorate "$RANGE" | while read -r line; do
                echo "- $line"
              done
              echo ""
              echo "## Crates"
              echo ""
              echo "| Crate | Version |"
              echo "|-------|---------|"
              echo "| \`gemini-live\` | $VERSION |"
              echo "| \`gemini-adk\` | $VERSION |"
              echo "| \`gemini-adk-fluent\` | $VERSION |"
              echo "| \`gemini-adk-server\` | $VERSION |"
              echo "| \`gemini-adk-cli\` | $VERSION |"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.version }}"
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          make_latest: ${{ !contains(steps.ver.outputs.version, '-') }}
