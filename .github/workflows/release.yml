name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order: L0 -> L1 -> L2
      - name: Publish rs-genai (L0)
        run: cargo publish -p rs-genai
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish rs-adk (L1)
        run: cargo publish -p rs-adk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish adk-rs-fluent (L2)
        run: cargo publish -p adk-rs-fluent
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish adk-cli
        run: cargo publish -p adk-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since the previous tag (or all commits if first release)
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ "$PREV_TAG" = "$GITHUB_REF_NAME" ] || [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV_TAG}..${GITHUB_REF_NAME}")
          fi

          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS" | while read -r line; do
              echo "- $line"
            done
            echo ""
            echo "## Crates"
            echo ""
            echo "| Crate | Version | crates.io |"
            echo "|-------|---------|-----------|"
            echo "| \`rs-genai\` | ${{ steps.version.outputs.version }} | [crates.io](https://crates.io/crates/rs-genai) |"
            echo "| \`rs-adk\` | ${{ steps.version.outputs.version }} | [crates.io](https://crates.io/crates/rs-adk) |"
            echo "| \`adk-rs-fluent\` | ${{ steps.version.outputs.version }} | [crates.io](https://crates.io/crates/adk-rs-fluent) |"
            echo "| \`adk-cli\` | ${{ steps.version.outputs.version }} | [crates.io](https://crates.io/crates/adk-cli) |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
