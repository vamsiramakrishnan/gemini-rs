name: Bug Report
description: Report a bug in gemini-rs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: dropdown
    id: crate
    attributes:
      label: Affected Crate
      options:
        - gemini-genai-rs (L0 — wire protocol)
        - gemini-adk-rs (L1 — agent runtime)
        - gemini-adk-fluent-rs (L2 — fluent DX)
        - apps/gemini-adk-web-rs
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: rust
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `cargo pkgid gemini-genai-rs` or the version in Cargo.toml"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Google AI (API key)
        - Vertex AI (Bearer token)
        - Both
        - N/A
    validations:
      required: true
