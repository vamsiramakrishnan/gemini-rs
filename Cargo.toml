[workspace]
resolver = "2"
members = [
    "crates/rs-genai",
    "crates/rs-adk",
    "crates/adk-rs-fluent",
    "apps/adk-server-core",
    "apps/adk-web",
    "apps/adk-api-server",
    "examples/agents",
    "examples/text-chat",
    "examples/voice-chat",
    "examples/tool-calling",
    "examples/transcription",
    "examples/cookbook",
    "tools/adk-transpiler",
    "tools/adk-cli",
]

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/vamsiramakrishnan/gemini-rs"

[workspace.lints.clippy]
type_complexity = "allow"
too_many_arguments = "allow"
field_reassign_with_default = "allow"
new_ret_no_self = "allow"
await_holding_lock = "allow"
