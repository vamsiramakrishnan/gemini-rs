[book]
title       = "gemini-rs"
description = "Full Rust SDK for the Gemini Multimodal Live API"
authors     = ["Vamsi Ramakrishnan"]
language    = "en"
src         = "src"

[build]
build-dir = "../target/book"

[output.html]
theme                   = "ayu"
preferred-dark-theme    = "ayu"
default-theme           = "light"
git-repository-url      = "https://github.com/vamsiramakrishnan/gemini-rs"
git-repository-icon     = "fa-github"
edit-url-template       = "https://github.com/vamsiramakrishnan/gemini-rs/edit/main/docs/{path}"
additional-css          = ["theme/custom.css"]
additional-js           = []
no-section-label        = false
fold.enable             = true
fold.level              = 1
copy-fonts              = true

[output.html.search]
enable          = true
limit-results   = 20
teaser-word-count = 30
use-boolean-and = true
boost-title     = 2
boost-hierarchy = 1
boost-paragraph = 1

[output.html.print]
enable = true
